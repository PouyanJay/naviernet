name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch: the CUDA build is a gigabyte and CI has no GPU.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Test
        # The raw dataset is not in the repository, so data-dependent tests
        # skip here; everything else runs.
        run: pytest -m "not needs_data" --cov --cov-report=term-missing

      - name: Config composes
        run: naviernet --cfg job --resolve
